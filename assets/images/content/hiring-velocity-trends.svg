<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#14171C"/>
  <text x="600" y="44" font-family="Inter,system-ui,sans-serif" font-size="22" font-weight="700" fill="#DDE0E6" text-anchor="middle">Hiring Velocity Trends</text>

  <!-- Main chart card -->
  <g transform="translate(40,70)">
    <rect width="720" height="520" rx="12" fill="#1C2028" stroke="#222832" stroke-width="1.5"/>
    <rect width="720" height="44" rx="12" fill="#222832"/>
    <text x="24" y="28" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="600" fill="#DDE0E6">Postings per Quarter — 8 quarter trend</text>
    <rect x="580" y="12" width="120" height="22" rx="4" fill="rgba(224,120,80,0.15)"/>
    <text x="640" y="27" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" fill="#E07850" text-anchor="middle">Rolling 90 days</text>

    <!-- Y-axis labels -->
    <g font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8a9499">
      <text x="50" y="90" text-anchor="end">400</text>
      <text x="50" y="160" text-anchor="end">300</text>
      <text x="50" y="230" text-anchor="end">200</text>
      <text x="50" y="300" text-anchor="end">100</text>
      <text x="50" y="370" text-anchor="end">0</text>
    </g>

    <!-- Grid lines -->
    <g stroke="#222832" stroke-width="1">
      <line x1="60" y1="85" x2="690" y2="85"/>
      <line x1="60" y1="155" x2="690" y2="155"/>
      <line x1="60" y1="225" x2="690" y2="225"/>
      <line x1="60" y1="295" x2="690" y2="295"/>
      <line x1="60" y1="365" x2="690" y2="365"/>
    </g>

    <!-- Axis -->
    <line x1="60" y1="365" x2="690" y2="365" stroke="#2a313a" stroke-width="1.5"/>

    <!-- Acme Corp area fill + line -->
    <path d="M 100 280 L 180 255 L 260 210 L 340 200 L 420 165 L 500 130 L 580 100 L 660 75 L 660 365 L 100 365 Z" fill="url(#emberGrad)" opacity="0.35"/>
    <polyline points="100,280 180,255 260,210 340,200 420,165 500,130 580,100 660,75" stroke="#E07850" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Beta Industries line (teal) -->
    <polyline points="100,260 180,275 260,285 340,270 420,290 500,300 580,295 660,310" stroke="#5B9EA6" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="6,4"/>

    <!-- Data points ember -->
    <g fill="#14171C" stroke="#E07850" stroke-width="2.5">
      <circle cx="100" cy="280" r="4"/>
      <circle cx="180" cy="255" r="4"/>
      <circle cx="260" cy="210" r="4"/>
      <circle cx="340" cy="200" r="4"/>
      <circle cx="420" cy="165" r="4"/>
      <circle cx="500" cy="130" r="4"/>
      <circle cx="580" cy="100" r="4"/>
      <circle cx="660" cy="75" r="5"/>
    </g>

    <!-- Data points teal -->
    <g fill="#14171C" stroke="#5B9EA6" stroke-width="2">
      <circle cx="100" cy="260" r="3"/>
      <circle cx="180" cy="275" r="3"/>
      <circle cx="260" cy="285" r="3"/>
      <circle cx="340" cy="270" r="3"/>
      <circle cx="420" cy="290" r="3"/>
      <circle cx="500" cy="300" r="3"/>
      <circle cx="580" cy="295" r="3"/>
      <circle cx="660" cy="310" r="3"/>
    </g>

    <!-- Last point callout -->
    <g transform="translate(660,75)">
      <rect x="-90" y="-36" width="84" height="24" rx="4" fill="#E07850"/>
      <text x="-48" y="-20" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="700" fill="#14171C" text-anchor="middle">387 ↑ 58%</text>
    </g>

    <!-- X-axis labels -->
    <g font-family="Inter,system-ui,sans-serif" font-size="10" fill="#8a9499" text-anchor="middle">
      <text x="100" y="386">Q2 24</text>
      <text x="180" y="386">Q3 24</text>
      <text x="260" y="386">Q4 24</text>
      <text x="340" y="386">Q1 25</text>
      <text x="420" y="386">Q2 25</text>
      <text x="500" y="386">Q3 25</text>
      <text x="580" y="386">Q4 25</text>
      <text x="660" y="386">Q1 26</text>
    </g>

    <!-- Legend -->
    <g transform="translate(60,420)">
      <line x1="0" y1="6" x2="24" y2="6" stroke="#E07850" stroke-width="3"/>
      <circle cx="12" cy="6" r="4" fill="#14171C" stroke="#E07850" stroke-width="2.5"/>
      <text x="32" y="10" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#DDE0E6">Acme Corp (accelerating)</text>
      <line x1="220" y1="6" x2="244" y2="6" stroke="#5B9EA6" stroke-width="2.5" stroke-dasharray="6,4"/>
      <text x="252" y="10" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#DDE0E6">Beta Industries (flat)</text>
    </g>

    <!-- Summary row -->
    <g transform="translate(60,450)">
      <rect width="630" height="50" rx="6" fill="rgba(224,120,80,0.06)"/>
      <text x="16" y="20" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" fill="#E07850">INSIGHT</text>
      <text x="16" y="38" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#DDE0E6">Acme posting volume up 58% QoQ. Pattern matches pre-launch ramp from their 2023 product cycle.</text>
    </g>

    <defs>
      <linearGradient id="emberGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#E07850" stop-opacity="0.5"/>
        <stop offset="100%" stop-color="#E07850" stop-opacity="0"/>
      </linearGradient>
    </defs>
  </g>

  <!-- Right panel: KPIs -->
  <g transform="translate(800,70)">
    <rect width="360" height="520" rx="12" fill="#1C2028" stroke="#222832" stroke-width="1.5"/>
    <text x="24" y="32" font-family="Inter,system-ui,sans-serif" font-size="15" font-weight="700" fill="#DDE0E6">Velocity KPIs</text>

    <g transform="translate(24,52)">
      <rect width="312" height="84" rx="8" fill="rgba(224,120,80,0.08)"/>
      <text x="16" y="26" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" fill="#E07850">QoQ GROWTH</text>
      <text x="16" y="60" font-family="Inter,system-ui,sans-serif" font-size="30" font-weight="800" fill="#DDE0E6">+58%</text>
      <text x="16" y="78" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8a9499">Acme Corp</text>
    </g>

    <g transform="translate(24,152)">
      <rect width="312" height="84" rx="8" fill="rgba(91,158,166,0.08)"/>
      <text x="16" y="26" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" fill="#5B9EA6">AVG TIME TO FILL</text>
      <text x="16" y="60" font-family="Inter,system-ui,sans-serif" font-size="30" font-weight="800" fill="#DDE0E6">41 days</text>
      <text x="16" y="78" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8a9499">Down from 56 days last quarter</text>
    </g>

    <g transform="translate(24,252)">
      <rect width="312" height="84" rx="8" fill="rgba(224,120,80,0.08)"/>
      <text x="16" y="26" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" fill="#E07850">NEW REQS</text>
      <text x="16" y="60" font-family="Inter,system-ui,sans-serif" font-size="30" font-weight="800" fill="#DDE0E6">387</text>
      <text x="16" y="78" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8a9499">Opened last 90 days</text>
    </g>

    <g transform="translate(24,352)">
      <rect width="312" height="144" rx="8" fill="#222832"/>
      <text x="16" y="28" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600" fill="#DDE0E6">Trend Signal</text>
      <g transform="translate(16,44)">
        <circle cx="6" cy="6" r="4" fill="#E07850"/>
        <text x="16" y="10" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8a9499">4 consecutive quarters of growth</text>
      </g>
      <g transform="translate(16,68)">
        <circle cx="6" cy="6" r="4" fill="#E07850"/>
        <text x="16" y="10" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8a9499">Engineering mix up 15 points</text>
      </g>
      <g transform="translate(16,92)">
        <circle cx="6" cy="6" r="4" fill="#5B9EA6"/>
        <text x="16" y="10" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8a9499">Sales hiring held flat</text>
      </g>
      <g transform="translate(16,116)">
        <circle cx="6" cy="6" r="4" fill="#E07850"/>
        <text x="16" y="10" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8a9499">Likely pre-launch build phase</text>
      </g>
    </g>
  </g>
</svg>
