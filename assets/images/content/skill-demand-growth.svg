<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#14171C"/>
  <text x="600" y="44" font-family="Inter,system-ui,sans-serif" font-size="22" font-weight="700" fill="#DDE0E6" text-anchor="middle">In-Demand Skills — Growth in Job Postings</text>

  <!-- Main bar chart card -->
  <g transform="translate(40,70)">
    <rect width="720" height="520" rx="12" fill="#1C2028" stroke="#222832" stroke-width="1.5"/>
    <rect width="720" height="44" rx="12" fill="#222832"/>
    <text x="24" y="28" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="600" fill="#DDE0E6">Skill mentions YoY — top engineering terms</text>
    <rect x="588" y="12" width="112" height="22" rx="4" fill="rgba(224,120,80,0.15)"/>
    <text x="644" y="27" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" fill="#E07850" text-anchor="middle">12 month window</text>

    <!-- Axis: 0% to 400% -->
    <g font-family="Inter,system-ui,sans-serif" font-size="10" fill="#8a9499">
      <text x="230" y="78">0%</text>
      <text x="330" y="78">+100%</text>
      <text x="430" y="78">+200%</text>
      <text x="530" y="78">+300%</text>
      <text x="630" y="78">+400%</text>
    </g>

    <g stroke="#222832" stroke-width="1">
      <line x1="234" y1="86" x2="234" y2="460"/>
      <line x1="334" y1="86" x2="334" y2="460"/>
      <line x1="434" y1="86" x2="434" y2="460"/>
      <line x1="534" y1="86" x2="534" y2="460"/>
      <line x1="634" y1="86" x2="634" y2="460"/>
    </g>

    <!-- Bars -->
    <!-- LLM / GenAI: +380% -->
    <g transform="translate(0,96)">
      <text x="24" y="20" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600" fill="#DDE0E6">LLM / GenAI</text>
      <text x="24" y="34" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#8a9499">1,284 mentions</text>
      <rect x="234" y="8" width="380" height="28" rx="4" fill="#E07850"/>
      <text x="624" y="27" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="700" fill="#E07850" text-anchor="start">+380%</text>
    </g>

    <!-- Rust: +240% -->
    <g transform="translate(0,142)">
      <text x="24" y="20" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600" fill="#DDE0E6">Rust</text>
      <text x="24" y="34" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#8a9499">542 mentions</text>
      <rect x="234" y="8" width="240" height="28" rx="4" fill="#E07850" opacity="0.85"/>
      <text x="484" y="27" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="700" fill="#E07850" text-anchor="start">+240%</text>
    </g>

    <!-- Kubernetes: +180% -->
    <g transform="translate(0,188)">
      <text x="24" y="20" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600" fill="#DDE0E6">Kubernetes</text>
      <text x="24" y="34" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#8a9499">892 mentions</text>
      <rect x="234" y="8" width="180" height="28" rx="4" fill="#E07850" opacity="0.75"/>
      <text x="424" y="27" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="700" fill="#E07850" text-anchor="start">+180%</text>
    </g>

    <!-- Vector DB: +160% -->
    <g transform="translate(0,234)">
      <text x="24" y="20" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600" fill="#DDE0E6">Vector Databases</text>
      <text x="24" y="34" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#8a9499">318 mentions</text>
      <rect x="234" y="8" width="160" height="28" rx="4" fill="#E07850" opacity="0.7"/>
      <text x="404" y="27" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="700" fill="#E07850" text-anchor="start">+160%</text>
    </g>

    <!-- Snowflake: +95% -->
    <g transform="translate(0,280)">
      <text x="24" y="20" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600" fill="#DDE0E6">Snowflake / dbt</text>
      <text x="24" y="34" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#8a9499">624 mentions</text>
      <rect x="234" y="8" width="95" height="28" rx="4" fill="#5B9EA6" opacity="0.8"/>
      <text x="339" y="27" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="700" fill="#5B9EA6" text-anchor="start">+95%</text>
    </g>

    <!-- TypeScript: +42% -->
    <g transform="translate(0,326)">
      <text x="24" y="20" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600" fill="#DDE0E6">TypeScript</text>
      <text x="24" y="34" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#8a9499">1,480 mentions</text>
      <rect x="234" y="8" width="42" height="28" rx="4" fill="#5B9EA6" opacity="0.65"/>
      <text x="286" y="27" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="700" fill="#5B9EA6" text-anchor="start">+42%</text>
    </g>

    <!-- Python: +18% -->
    <g transform="translate(0,372)">
      <text x="24" y="20" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600" fill="#DDE0E6">Python</text>
      <text x="24" y="34" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#8a9499">2,106 mentions</text>
      <rect x="234" y="8" width="18" height="28" rx="4" fill="#5B9EA6" opacity="0.5"/>
      <text x="262" y="27" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="700" fill="#5B9EA6" text-anchor="start">+18%</text>
    </g>

    <!-- jQuery: -52% -->
    <g transform="translate(0,418)">
      <text x="24" y="20" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600" fill="#8a9499">jQuery</text>
      <text x="24" y="34" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#8a9499">118 mentions</text>
      <rect x="182" y="8" width="52" height="28" rx="4" fill="#5B9EA6" opacity="0.3"/>
      <text x="172" y="27" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="700" fill="#5B9EA6" text-anchor="end">-52%</text>
    </g>

    <!-- Footer note -->
    <g transform="translate(24,478)">
      <text x="0" y="10" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8a9499">Based on 27,000+ engineering postings across a 60 company competitor set.</text>
    </g>
  </g>

  <!-- Right panel: hot & cold -->
  <g transform="translate(800,70)">
    <rect width="360" height="520" rx="12" fill="#1C2028" stroke="#222832" stroke-width="1.5"/>
    <text x="24" y="32" font-family="Inter,system-ui,sans-serif" font-size="15" font-weight="700" fill="#DDE0E6">Hot &amp; Cold Skills</text>

    <!-- Hot -->
    <g transform="translate(24,52)">
      <text x="0" y="14" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" fill="#E07850">HEATING UP</text>
      <rect y="22" width="312" height="40" rx="6" fill="rgba(224,120,80,0.1)"/>
      <text x="16" y="40" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600" fill="#DDE0E6">LangChain</text>
      <text x="296" y="47" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="700" fill="#E07850" text-anchor="end">+520%</text>
      <rect y="68" width="312" height="40" rx="6" fill="rgba(224,120,80,0.1)"/>
      <text x="16" y="86" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600" fill="#DDE0E6">RAG / Retrieval</text>
      <text x="296" y="93" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="700" fill="#E07850" text-anchor="end">+410%</text>
      <rect y="114" width="312" height="40" rx="6" fill="rgba(224,120,80,0.1)"/>
      <text x="16" y="132" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600" fill="#DDE0E6">Agent Frameworks</text>
      <text x="296" y="139" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="700" fill="#E07850" text-anchor="end">+340%</text>
      <rect y="160" width="312" height="40" rx="6" fill="rgba(224,120,80,0.1)"/>
      <text x="16" y="178" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600" fill="#DDE0E6">PyTorch</text>
      <text x="296" y="185" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="700" fill="#E07850" text-anchor="end">+210%</text>
    </g>

    <!-- Cold -->
    <g transform="translate(24,278)">
      <text x="0" y="14" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" fill="#5B9EA6">COOLING DOWN</text>
      <rect y="22" width="312" height="40" rx="6" fill="rgba(91,158,166,0.08)"/>
      <text x="16" y="40" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600" fill="#DDE0E6">AngularJS</text>
      <text x="296" y="47" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="700" fill="#5B9EA6" text-anchor="end">-68%</text>
      <rect y="68" width="312" height="40" rx="6" fill="rgba(91,158,166,0.08)"/>
      <text x="16" y="86" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600" fill="#DDE0E6">Perl</text>
      <text x="296" y="93" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="700" fill="#5B9EA6" text-anchor="end">-61%</text>
      <rect y="114" width="312" height="40" rx="6" fill="rgba(91,158,166,0.08)"/>
      <text x="16" y="132" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600" fill="#DDE0E6">jQuery</text>
      <text x="296" y="139" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="700" fill="#5B9EA6" text-anchor="end">-52%</text>
    </g>

    <!-- Insight box -->
    <g transform="translate(24,444)">
      <rect width="312" height="56" rx="8" fill="#222832"/>
      <text x="16" y="24" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600" fill="#DDE0E6">What it means</text>
      <text x="16" y="44" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8a9499">AI stack mentions are leading indicators of product direction.</text>
    </g>
  </g>
</svg>
