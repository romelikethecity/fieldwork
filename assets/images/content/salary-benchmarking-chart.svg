<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#14171C"/>
  <text x="600" y="44" font-family="Inter,system-ui,sans-serif" font-size="22" font-weight="700" fill="#DDE0E6" text-anchor="middle">Salary Benchmarking From Live Job Postings</text>

  <!-- Left card: range chart -->
  <g transform="translate(40,70)">
    <rect width="720" height="520" rx="12" fill="#1C2028" stroke="#222832" stroke-width="1.5"/>
    <rect width="720" height="44" rx="12" fill="#222832"/>
    <text x="24" y="28" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="600" fill="#DDE0E6">Senior SWE Comp Ranges — Q1 2026</text>
    <rect x="600" y="12" width="100" height="22" rx="4" fill="rgba(224,120,80,0.15)"/>
    <text x="650" y="27" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" fill="#E07850" text-anchor="middle">Base USD</text>

    <!-- Axis labels -->
    <g transform="translate(180,80)" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8a9499">
      <text x="0" y="0">$120K</text>
      <text x="100" y="0">$160K</text>
      <text x="200" y="0">$200K</text>
      <text x="300" y="0">$240K</text>
      <text x="400" y="0">$280K</text>
      <text x="500" y="0">$320K</text>
    </g>

    <!-- Grid lines -->
    <g stroke="#222832" stroke-width="1">
      <line x1="180" y1="90" x2="680" y2="90"/>
      <line x1="180" y1="420" x2="680" y2="420"/>
      <line x1="280" y1="90" x2="280" y2="420"/>
      <line x1="380" y1="90" x2="380" y2="420"/>
      <line x1="480" y1="90" x2="480" y2="420"/>
      <line x1="580" y1="90" x2="580" y2="420"/>
    </g>

    <!-- Market median line -->
    <line x1="395" y1="90" x2="395" y2="420" stroke="#5B9EA6" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.6"/>
    <text x="395" y="440" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#5B9EA6" text-anchor="middle">Market Median</text>

    <!-- Company rows with range bars -->
    <!-- Acme -->
    <g transform="translate(0,110)">
      <text x="24" y="16" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600" fill="#DDE0E6">Acme Corp</text>
      <text x="24" y="32" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#8a9499">SF / Remote</text>
      <rect x="200" y="8" width="260" height="20" rx="4" fill="rgba(224,120,80,0.2)"/>
      <rect x="290" y="12" width="80" height="12" rx="2" fill="#E07850"/>
      <text x="680" y="22" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" fill="#E07850" text-anchor="end">$180K–$260K</text>
    </g>
    <!-- Beta -->
    <g transform="translate(0,160)">
      <text x="24" y="16" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600" fill="#DDE0E6">Beta Industries</text>
      <text x="24" y="32" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#8a9499">NYC</text>
      <rect x="230" y="8" width="220" height="20" rx="4" fill="rgba(91,158,166,0.2)"/>
      <rect x="300" y="12" width="70" height="12" rx="2" fill="#5B9EA6"/>
      <text x="680" y="22" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" fill="#5B9EA6" text-anchor="end">$192K–$256K</text>
    </g>
    <!-- Catalyst -->
    <g transform="translate(0,210)">
      <text x="24" y="16" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600" fill="#DDE0E6">Catalyst Tech</text>
      <text x="24" y="32" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#8a9499">Remote US</text>
      <rect x="260" y="8" width="300" height="20" rx="4" fill="rgba(224,120,80,0.2)"/>
      <rect x="360" y="12" width="90" height="12" rx="2" fill="#E07850"/>
      <text x="680" y="22" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" fill="#E07850" text-anchor="end">$210K–$296K</text>
    </g>
    <!-- Delta -->
    <g transform="translate(0,260)">
      <text x="24" y="16" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600" fill="#DDE0E6">Delta Labs</text>
      <text x="24" y="32" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#8a9499">Austin</text>
      <rect x="180" y="8" width="200" height="20" rx="4" fill="rgba(91,158,166,0.2)"/>
      <rect x="245" y="12" width="70" height="12" rx="2" fill="#5B9EA6"/>
      <text x="680" y="22" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" fill="#5B9EA6" text-anchor="end">$156K–$220K</text>
    </g>
    <!-- Echo -->
    <g transform="translate(0,310)">
      <text x="24" y="16" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600" fill="#DDE0E6">Echo Systems</text>
      <text x="24" y="32" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#8a9499">Seattle</text>
      <rect x="215" y="8" width="265" height="20" rx="4" fill="rgba(224,120,80,0.2)"/>
      <rect x="310" y="12" width="80" height="12" rx="2" fill="#E07850"/>
      <text x="680" y="22" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" fill="#E07850" text-anchor="end">$182K–$278K</text>
    </g>
    <!-- Foxtrot -->
    <g transform="translate(0,360)">
      <text x="24" y="16" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600" fill="#DDE0E6">Foxtrot AI</text>
      <text x="24" y="32" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#8a9499">SF</text>
      <rect x="290" y="8" width="320" height="20" rx="4" fill="rgba(224,120,80,0.2)"/>
      <rect x="400" y="12" width="100" height="12" rx="2" fill="#E07850"/>
      <text x="680" y="22" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" fill="#E07850" text-anchor="end">$228K–$324K</text>
    </g>

    <!-- Legend -->
    <g transform="translate(24,470)">
      <rect width="14" height="10" rx="2" fill="rgba(224,120,80,0.2)"/>
      <text x="22" y="9" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8a9499">Posted range</text>
      <rect x="130" width="14" height="10" rx="2" fill="#E07850"/>
      <text x="152" y="9" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8a9499">25th–75th pctl</text>
      <line x1="280" y1="5" x2="300" y2="5" stroke="#5B9EA6" stroke-width="1.5" stroke-dasharray="3,3"/>
      <text x="308" y="9" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8a9499">Market median</text>
    </g>
  </g>

  <!-- Right panel: summary stats -->
  <g transform="translate(800,70)">
    <rect width="360" height="520" rx="12" fill="#1C2028" stroke="#222832" stroke-width="1.5"/>
    <text x="24" y="32" font-family="Inter,system-ui,sans-serif" font-size="15" font-weight="700" fill="#DDE0E6">Market Snapshot</text>

    <g transform="translate(24,52)">
      <rect width="312" height="90" rx="8" fill="rgba(224,120,80,0.08)"/>
      <text x="16" y="28" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" fill="#E07850">MEDIAN BASE</text>
      <text x="16" y="62" font-family="Inter,system-ui,sans-serif" font-size="30" font-weight="800" fill="#DDE0E6">$216K</text>
      <text x="16" y="82" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8a9499">Senior SWE, 24 postings</text>
    </g>

    <g transform="translate(24,156)">
      <rect width="312" height="90" rx="8" fill="rgba(91,158,166,0.08)"/>
      <text x="16" y="28" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" fill="#5B9EA6">RANGE SPREAD</text>
      <text x="16" y="62" font-family="Inter,system-ui,sans-serif" font-size="30" font-weight="800" fill="#DDE0E6">$156–$324K</text>
      <text x="16" y="82" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8a9499">Bottom to top of market</text>
    </g>

    <g transform="translate(24,260)">
      <rect width="312" height="90" rx="8" fill="rgba(224,120,80,0.08)"/>
      <text x="16" y="28" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" fill="#E07850">YoY CHANGE</text>
      <text x="16" y="62" font-family="Inter,system-ui,sans-serif" font-size="30" font-weight="800" fill="#DDE0E6">+7.4%</text>
      <text x="16" y="82" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8a9499">vs Q1 2025 median</text>
    </g>

    <g transform="translate(24,364)">
      <rect width="312" height="90" rx="8" fill="#222832"/>
      <text x="16" y="28" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600" fill="#DDE0E6">Top of Market</text>
      <text x="16" y="50" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#8a9499">Foxtrot AI is paying 50% above</text>
      <text x="16" y="66" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#8a9499">market median. Watch for</text>
      <text x="16" y="82" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#8a9499">aggressive poaching.</text>
    </g>

    <g transform="translate(24,468)">
      <text x="0" y="16" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8a9499">Pulled from 24 public postings</text>
      <text x="0" y="32" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8a9499">with mandatory pay disclosure.</text>
    </g>
  </g>
</svg>
