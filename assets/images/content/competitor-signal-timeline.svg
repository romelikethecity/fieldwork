<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#14171C"/>
  <text x="600" y="44" font-family="Inter,system-ui,sans-serif" font-size="22" font-weight="700" fill="#DDE0E6" text-anchor="middle">Competitor Signal Timeline</text>

  <!-- Main timeline card -->
  <g transform="translate(40,70)">
    <rect width="720" height="520" rx="12" fill="#1C2028" stroke="#222832" stroke-width="1.5"/>
    <rect width="720" height="44" rx="12" fill="#222832"/>
    <text x="24" y="28" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="600" fill="#DDE0E6">Acme Corp — hiring signals, 6 months</text>
    <rect x="580" y="12" width="120" height="22" rx="4" fill="rgba(224,120,80,0.15)"/>
    <text x="640" y="27" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" fill="#E07850" text-anchor="middle">12 key events</text>

    <!-- Vertical timeline axis -->
    <line x1="140" y1="80" x2="140" y2="490" stroke="#2a313a" stroke-width="2"/>

    <!-- Month labels -->
    <g font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8a9499" text-anchor="end">
      <text x="120" y="96">Oct 2025</text>
      <text x="120" y="166">Nov 2025</text>
      <text x="120" y="236">Dec 2025</text>
      <text x="120" y="306">Jan 2026</text>
      <text x="120" y="376">Feb 2026</text>
      <text x="120" y="456">Mar 2026</text>
    </g>

    <!-- Event 1 -->
    <g transform="translate(140,92)">
      <circle cx="0" cy="0" r="7" fill="#14171C" stroke="#5B9EA6" stroke-width="2.5"/>
      <rect x="20" y="-18" width="540" height="36" rx="6" fill="rgba(91,158,166,0.08)"/>
      <text x="36" y="-2" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600" fill="#5B9EA6">First VP Product hire in 18 months</text>
      <text x="36" y="14" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8a9499">Ex-Stripe. Signals a product reorg underway.</text>
    </g>

    <!-- Event 2 -->
    <g transform="translate(140,162)">
      <circle cx="0" cy="0" r="7" fill="#14171C" stroke="#5B9EA6" stroke-width="2.5"/>
      <rect x="20" y="-18" width="540" height="36" rx="6" fill="rgba(91,158,166,0.08)"/>
      <text x="36" y="-2" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600" fill="#5B9EA6">5 ML engineering postings opened</text>
      <text x="36" y="14" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8a9499">First ML hires. Requirements mention LLM serving.</text>
    </g>

    <!-- Event 3 -->
    <g transform="translate(140,232)">
      <circle cx="0" cy="0" r="8" fill="#E07850"/>
      <rect x="20" y="-18" width="540" height="36" rx="6" fill="rgba(224,120,80,0.12)"/>
      <text x="36" y="-2" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600" fill="#E07850">SRE + infra wave — 8 postings</text>
      <text x="36" y="14" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8a9499">Scaling prep. GCP added alongside AWS stack.</text>
    </g>

    <!-- Event 4 -->
    <g transform="translate(140,302)">
      <circle cx="0" cy="0" r="8" fill="#E07850"/>
      <rect x="20" y="-18" width="540" height="36" rx="6" fill="rgba(224,120,80,0.12)"/>
      <text x="36" y="-2" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600" fill="#E07850">Enterprise AE ramp — 6 postings, NYC/Boston</text>
      <text x="36" y="14" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8a9499">Moving upmarket. Expect competitive pressure on east coast deals.</text>
    </g>

    <!-- Event 5 -->
    <g transform="translate(140,372)">
      <circle cx="0" cy="0" r="8" fill="#E07850"/>
      <rect x="20" y="-18" width="540" height="36" rx="6" fill="rgba(224,120,80,0.12)"/>
      <text x="36" y="-2" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600" fill="#E07850">Head of DevRel opened — first ever</text>
      <text x="36" y="14" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8a9499">Platform / API strategy. Ecosystem play in 6-9 months.</text>
    </g>

    <!-- Event 6 - current -->
    <g transform="translate(140,452)">
      <circle cx="0" cy="0" r="10" fill="#E07850"/>
      <circle cx="0" cy="0" r="16" fill="none" stroke="#E07850" stroke-width="1.5" opacity="0.4"/>
      <rect x="20" y="-18" width="540" height="36" rx="6" fill="#E07850"/>
      <text x="36" y="-2" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="700" fill="#14171C">Solutions Engineer + Compliance hires</text>
      <text x="36" y="14" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#14171C">Enterprise deal pipeline is real. Launch imminent.</text>
    </g>

    <!-- "NOW" marker -->
    <g transform="translate(670,452)">
      <rect x="-22" y="-12" width="44" height="24" rx="4" fill="#14171C" stroke="#E07850" stroke-width="1.5"/>
      <text x="0" y="5" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="700" fill="#E07850" text-anchor="middle">NOW</text>
    </g>
  </g>

  <!-- Right panel: summary -->
  <g transform="translate(800,70)">
    <rect width="360" height="520" rx="12" fill="#1C2028" stroke="#222832" stroke-width="1.5"/>
    <text x="24" y="32" font-family="Inter,system-ui,sans-serif" font-size="15" font-weight="700" fill="#DDE0E6">Signal Summary</text>

    <g transform="translate(24,52)">
      <rect width="312" height="72" rx="8" fill="rgba(224,120,80,0.08)"/>
      <text x="16" y="24" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600" fill="#E07850">PREDICTED MOVE</text>
      <text x="16" y="46" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="700" fill="#DDE0E6">Enterprise + AI launch</text>
      <text x="16" y="62" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8a9499">Estimated Q2-Q3 2026 announcement</text>
    </g>

    <g transform="translate(24,140)">
      <rect width="312" height="72" rx="8" fill="rgba(91,158,166,0.08)"/>
      <text x="16" y="24" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600" fill="#5B9EA6">CONFIDENCE</text>
      <text x="16" y="46" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="700" fill="#DDE0E6">High — 4 converging signals</text>
      <text x="16" y="62" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8a9499">Exec hire + ML + SRE + SE ramp</text>
    </g>

    <g transform="translate(24,228)">
      <rect width="312" height="120" rx="8" fill="#222832"/>
      <text x="16" y="28" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600" fill="#DDE0E6">Signal Chain</text>
      <g transform="translate(16,44)">
        <text x="0" y="10" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8a9499">1. Exec hire →</text>
      </g>
      <g transform="translate(16,60)">
        <text x="0" y="10" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8a9499">2. Build team →</text>
      </g>
      <g transform="translate(16,76)">
        <text x="0" y="10" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8a9499">3. Scale infra →</text>
      </g>
      <g transform="translate(16,92)">
        <text x="0" y="10" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8a9499">4. GTM ramp →</text>
      </g>
    </g>

    <g transform="translate(24,364)">
      <rect width="312" height="132" rx="8" fill="rgba(224,120,80,0.06)"/>
      <text x="16" y="28" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600" fill="#E07850">Recommended Action</text>
      <text x="16" y="52" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#DDE0E6">Brief sales on Acme's NYC/Boston</text>
      <text x="16" y="68" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#DDE0E6">expansion this week.</text>
      <text x="16" y="92" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#DDE0E6">Expect them in your enterprise</text>
      <text x="16" y="108" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#DDE0E6">deals within 30 days.</text>
    </g>
  </g>
</svg>
